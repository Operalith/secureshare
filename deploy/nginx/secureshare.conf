limit_req_zone $binary_remote_addr zone=secureshare_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=secureshare_api:10m rate=120r/m;

map $http_x_request_id $secureshare_request_id {
    default $http_x_request_id;
    "" $request_id;
}

map $request_uri $secureshare_log_uri {
    default $uri;
    ~^/api/v1/auth/login "[redacted-auth]";
    ~^/api/v1/secret-links/prepare "[redacted-recipient-prepare]";
    ~^/api/v1/secret-links/consume "[redacted-recipient-consume]";
    ~^/api/v1/secret-links/[^/]+/revoke "[redacted-admin-revoke]";
    ~^/api/v1/secret-links "[redacted-admin-secret-links]";
}

log_format secureshare_json escape=json
  '{"time":"$time_iso8601","request_id":"$secureshare_request_id",'
  '"remote_addr":"$remote_addr","method":"$request_method","uri":"$secureshare_log_uri",'
  '"status":$status,"bytes":$body_bytes_sent,"duration":$request_time,'
  '"upstream_status":"$upstream_status","upstream_duration":"$upstream_response_time"}';

server {
    listen 443 ssl http2;
    server_name secureshare.example.com;

    ssl_certificate /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    access_log /var/log/nginx/secureshare.access.log secureshare_json;
    error_log /var/log/nginx/secureshare.error.log warn;

    client_max_body_size 64k;
    client_body_timeout 10s;
    keepalive_timeout 30s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /api/v1/auth/login {
        limit_req zone=secureshare_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $secureshare_request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
    }

    location /api/ {
        limit_req zone=secureshare_api burst=60 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $secureshare_request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $secureshare_request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
    }
}

server {
    listen 80;
    server_name secureshare.example.com;
    return 301 https://$host$request_uri;
}
