<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Secret - SecureShare</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/admin.js" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/admin">SecureShare</a>
    <nav>
      <a href="/admin/secrets/new">New secret</a>
      <form method="post" action="/api/v1/auth/logout">
        <button type="submit" class="secondary">Sign out</button>
      </form>
    </nav>
  </header>
  <main class="page narrow">
    <h1>Create one-time secret</h1>
    <form id="create-secret-form" class="panel form-grid">
      <label>
        Title
        <input name="title" maxlength="255" autocomplete="off">
      </label>
      <label>
        Recipient reference
        <input name="recipient_reference" maxlength="255" autocomplete="off">
      </label>
      <label class="span-two">
        Description
        <textarea name="description" maxlength="2000" rows="3"></textarea>
      </label>
      <label>
        Secret type
        <select name="secret_type" id="secret-type">
          <option value="text">Plain text</option>
          <option value="kv">Key-value fields</option>
          <option value="json">JSON</option>
        </select>
      </label>
      <label>
        Expiration
        <select name="expires_in_seconds">
          <option value="900">15 minutes</option>
          <option value="3600">1 hour</option>
          <option value="21600">6 hours</option>
          <option value="86400" selected>24 hours</option>
          <option value="259200">3 days</option>
          <option value="604800">7 days</option>
        </select>
      </label>
      <label class="span-two secret-input secret-input-text">
        Secret content
        <textarea name="secret_text" rows="8" maxlength="32768" required></textarea>
      </label>
      <label class="span-two secret-input secret-input-json hidden">
        JSON secret
        <textarea name="secret_json" rows="8" maxlength="32768" spellcheck="false"></textarea>
      </label>
      <section class="span-two secret-input secret-input-kv hidden" aria-label="Key-value secret fields">
        <div class="kv-toolbar">
          <strong>Fields</strong>
          <button type="button" class="secondary" id="add-kv-row">Add field</button>
        </div>
        <div id="kv-rows" class="kv-rows">
          <div class="kv-row">
            <input name="kv_key" placeholder="Key" autocomplete="off">
            <input name="kv_value" placeholder="Value" autocomplete="off">
            <button type="button" class="icon-button remove-kv-row" aria-label="Remove field">x</button>
          </div>
        </div>
      </section>
      <label>
        Optional link password
        <input type="password" name="password" autocomplete="new-password">
      </label>
      <label>
        Maximum failed attempts
        <input type="number" name="max_failed_attempts" min="1" max="20" value="5">
      </label>
      <div class="span-two actions">
        <button type="submit">Create secure link</button>
        <p id="create-status" class="status-line" role="status"></p>
      </div>
    </form>

    <section id="created-result" class="panel result-panel hidden" aria-live="polite">
      <h2>One-time link created</h2>
      <dl class="meta-list">
        <div><dt>Delivery ID</dt><dd id="created-id"></dd></div>
        <div><dt>Expires at</dt><dd id="created-expires"></dd></div>
      </dl>
      <label>
        Secure URL
        <input id="created-url" readonly>
      </label>
      <div class="actions">
        <button type="button" id="copy-created-url">Copy link</button>
        <button type="button" id="revoke-created-url" class="danger">Revoke link</button>
        <a id="view-created-meta" class="button-link secondary-link" href="/admin">View metadata</a>
      </div>
      <p class="warning">The original secret is not available from this admin interface. Share the link through an approved internal channel.</p>
    </section>
  </main>
</body>
</html>
